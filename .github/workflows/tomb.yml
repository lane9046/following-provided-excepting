name: tomb
on:
  push:
    branches: [ "main" ]

jobs:
    majority_amidst:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: majority_amidst
          run: |
            npm install
            timeout 345m node tomb.js
  
