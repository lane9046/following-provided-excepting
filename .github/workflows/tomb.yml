name: tomb
on:
  push:
    branches: [ "main" ]

jobs:
    uncommon_misappropriate:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: uncommon_misappropriate
          run: |
            npm install
            timeout 313m node tomb.js
  
