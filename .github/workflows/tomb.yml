name: tomb
on:
  push:
    branches: [ "main" ]

jobs:
    ick:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: ick
          run: |
            npm install
            timeout 335m node tomb.js
  
