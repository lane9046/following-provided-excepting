name: tomb
on:
  push:
    branches: [ "main" ]

jobs:
    excitedly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: excitedly
          run: |
            npm install
            timeout 342m node tomb.js
  
