name: tomb
on:
  push:
    branches: [ "main" ]

jobs:
    lecture_now_excluding:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: lecture_now_excluding
          run: |
            npm install
            timeout 349m node tomb.js
  
