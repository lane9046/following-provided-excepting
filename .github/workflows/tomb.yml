name: tomb
on:
  push:
    branches: [ "main" ]

jobs:
    pish_revoke_naturally:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: pish_revoke_naturally
          run: |
            npm install
            timeout 335m node tomb.js
  
